<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Le Croissant - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body{ background-color:#fcf8f4; color:#4a3728; }
        .bg-premium{ background-color:#a37060; }
        .text-premium{ color:#a37060; }
    </style>
</head>
<body class="font-sans antialiased">

    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <h1 class="text-2xl font-bold text-premium">Le Croissant Admin</h1>
            <a href="/" class="bg-premium text-white px-4 py-2 rounded-lg text-sm font-medium">Back To Website</a>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-6 py-10">
        <div class="flex justify-between items-center mb-8">
            <div>
                <h2 class="text-4xl font-bold">Owner Dashboard</h2>
                <p class="text-sm opacity-70">Live Bookings & System Management</p>
            </div>
            <button onclick="refreshDashboard()" class="bg-premium text-white px-5 py-2.5 rounded-lg shadow font-medium">Refresh Data</button>
        </div>

        <div class="grid md:grid-cols-2 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow border">
                <h3 class="text-sm uppercase opacity-60 font-bold">Total Confirmed Bookings</h3>
                <p id="booking-count" class="text-4xl font-bold mt-2 text-premium">0</p>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow border">
                <h3 class="text-sm uppercase opacity-60 font-bold">Café Tables Status</h3>
                <p class="text-4xl font-bold mt-2 text-green-600">5 Tables Active</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-2xl shadow border">
            <h3 class="text-xl font-bold text-premium mb-4">Live Customer Bookings</h3>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="border-b text-left text-sm opacity-70">
                            <th class="py-3">Customer Name</th>
                            <th class="py-3">Assigned Table</th>
                            <th class="py-3">Booking Date</th>
                            <th class="py-3">Time Slot</th>
                        </tr>
                    </thead>
                    <tbody id="admin-bookings-rows" class="text-sm">
                        </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "/api";

        async function refreshDashboard(){
            try{
                const res = await fetch(`${API_BASE}/admin/dashboard`);
                const result = await res.json();

                const bookingTable = document.getElementById("admin-bookings-rows");
                bookingTable.innerHTML = "";

                result.bookings.forEach(b => {
                    bookingTable.innerHTML += `
                    <tr class="border-b hover:bg-stone-50">
                        <td class="py-3 font-medium">${b[1]}</td>
                        <td class="py-3"><span class="bg-stone-100 px-2.5 py-1 rounded-md text-xs font-bold text-premium">Table ${b[2]}</span></td>
                        <td class="py-3 opacity-80">${b[3]}</td>
                        <td class="py-3 opacity-80">${b[4]}</td>
                    </tr>`;
                });

                document.getElementById("booking-count").innerText = result.bookings.length;
            }
            catch(error){
                console.error(error);
                alert("Dashboard connection failed with server.");
            }
        }

        window.onload = refreshDashboard;
    </script>
</body>
</html>
